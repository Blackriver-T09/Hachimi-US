<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Mambo Dance GIF</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1c1d25;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 {
            color: #a855f7;
            margin-bottom: 20px;
        }
        img {
            max-width: 500px;
            border: 4px solid #a855f7;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.3);
        }
        .info {
            margin-top: 20px;
            padding: 10px 20px;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid #a855f7;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>🕺 Mambo Dance GIF Test</h1>
    <img src="/mambo_dance.gif" alt="Mambo Dance" id="gif">
    <div class="info">
        <p id="status">Loading GIF...</p>
    </div>

    <script>
        const gif = document.getElementById('gif');
        const status = document.getElementById('status');

        gif.onload = () => {
            status.textContent = '✅ GIF loaded successfully!';
            status.style.color = '#4ade80';
        };

        gif.onerror = () => {
            status.textContent = '❌ Failed to load GIF';
            status.style.color = '#ef4444';
        };
    </script>
</body>
</html>
